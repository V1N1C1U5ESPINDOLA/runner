name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-java:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build e testes (assinador-digital)
        working-directory: assinador-digital
        run: ./mvnw verify

  test-go:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: assinatura/go.sum

      - name: Vet
        working-directory: assinatura
        run: go vet ./...

      - name: Testes
        working-directory: assinatura
        run: go test ./...

  build-go:
    needs: [test-java, test-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: assinatura/go.sum

      - name: Cross-compile (assinatura)
        working-directory: assinatura
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/assinatura-linux-amd64   .
          GOOS=windows GOARCH=amd64 go build -o dist/assinatura-windows-amd64.exe .
          GOOS=darwin  GOARCH=amd64 go build -o dist/assinatura-darwin-amd64  .

      - uses: actions/upload-artifact@v4
        with:
          name: assinatura-binaries
          path: assinatura/dist/
