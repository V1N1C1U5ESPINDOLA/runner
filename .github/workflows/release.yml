name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test-java:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build e testes (assinador-digital)
        working-directory: assinador-digital
        run: ./mvnw verify

  test-go:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: assinatura/go.sum

      - name: Vet
        working-directory: assinatura
        run: go vet ./...

      - name: Testes
        working-directory: assinatura
        run: go test ./...

  build:
    needs: [test-java, test-go]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Empacotar assinador.jar
        working-directory: assinador-digital
        run: ./mvnw package -DskipTests

      - name: Copiar e renomear assinador.jar
        run: |
          mkdir -p dist
          cp assinador-digital/target/assinador-*.jar dist/assinador-${VERSION}.jar

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: assinatura/go.sum

      - name: Cross-compile (assinatura)
        working-directory: assinatura
        run: |
          PKG=github.com/V1N1C1U5ESPINDOLA/runner/assinatura/internal/runner
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X ${PKG}.Version=${VERSION}" -o dist/assinatura-${VERSION}-linux-amd64   .
          GOOS=windows GOARCH=amd64 go build -ldflags "-X ${PKG}.Version=${VERSION}" -o dist/assinatura-${VERSION}-windows-amd64.exe .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X ${PKG}.Version=${VERSION}" -o dist/assinatura-${VERSION}-darwin-amd64  .
          cp -r dist ../dist/

      - name: Gerar checksums SHA256
        run: |
          cd dist
          sha256sum * > checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - uses: sigstore/cosign-installer@v3

      - name: Assinar artefatos com Cosign (keyless OIDC)
        run: |
          for f in dist/assinador-*.jar dist/assinatura-*; do
            # ignora checksums.txt e arquivos já assinados
            [[ "$f" == *.sig ]] || [[ "$f" == *.pem ]] || [[ "$f" == *checksums* ]] && continue
            cosign sign-blob --yes \
              --output-certificate "${f}.pem" \
              --output-signature   "${f}.sig" \
              "$f"
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
